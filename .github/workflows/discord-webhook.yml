name: Daily Discord Webhook

on:
  schedule:
    - cron: '5 16 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        run: |
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d '{"content":"Your daily message here!"}' \
            '${{ secrets.DISCORD_WEBHOOK }}'
